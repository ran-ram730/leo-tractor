<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Engine</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      color:white;
    }

    header{
      background:#111827;
      padding:20px;
      text-align:center;
    }

    header h1{
      color:#3b82f6;
      font-size:45px;
    }

    .hero{
      text-align:center;
      padding:80px 20px;
    }

    .search-box{
      margin-top:30px;
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .search-box input{
      width:60%;
      padding:15px;
      border:none;
      border-radius:10px;
      font-size:18px;
    }

    .search-box button{
      padding:15px 25px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      cursor:pointer;
      font-size:18px;
    }

    .search-box button:hover{
      background:#1d4ed8;
    }

    .result{
      width:80%;
      margin:30px auto;
      background:#1e293b;
      padding:20px;
      border-radius:15px;
      display:none;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:40px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:15px;
    }

    .card h3{
      color:#60a5fa;
      margin-bottom:10px;
    }

    footer{
      background:#111827;
      text-align:center;
      padding:20px;
      margin-top:40px;
    }

  </style>

</head>
<body>

<header>
  <h1>Search Engine</h1>
  <p>Duniya ki legal jankari</p>
</header>

<section class="hero">

  <h2>Kuch bhi poochhiye</h2>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Apna sawal likhiye">
    <button onclick="searchData()">Search</button>
  </div>

</section>

<div class="result" id="resultBox"></div>

<section class="cards">

  <div class="card">
    <h3>Technology</h3>
    <p>AI, Coding aur Internet ki jankari.</p>
  </div>

  <div class="card">
    <h3>Education</h3>
    <p>Study aur exams ki jankari.</p>
  </div>

  <div class="card">
    <h3>Business</h3>
    <p>Online earning aur startup ideas.</p>
  </div>

  <div class="card">
    <h3>Health</h3>
    <p>Fitness aur healthy lifestyle tips.</p>
  </div>

</section>

<footer>
  © 2026 Search Engine
</footer>

<script>

function searchData(){

  let input =
  document.getElementById("searchInput")
  .value.toLowerCase();

  let result =
  document.getElementById("resultBox");

  let answer = "";

  if(input.includes("ai")){

    answer =
    "AI ka matlab Artificial Intelligence hota hai.";

  }

  else if(input.includes("business")){

    answer =
    "Online business ideas: YouTube, Blogging, Freelancing.";

  }

  else if(input.includes("health")){

    answer =
    "Healthy rehne ke liye exercise aur proper sleep zaruri hai.";

  }

  else if(input.includes("india")){

    answer =
    "India ka capital New Delhi hai.";

  }

  else if(input == ""){

    answer =
    "Kripya koi sawal likhiye.";

  }

  else{

    answer =
    "Sirf legal aur educational sawalon ke jawab diye jaate hain.";

  }

  result.style.display = "block";

  result.innerHTML =
  "<h2>Answer</h2><p>"+answer+"</p>";

}

</script>

</body>
      </html>
