<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Downloader</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:linear-gradient(135deg,#ff416c,#ff4b2b);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      width:450px;
      background:#fff;
      padding:40px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
      color:#333;
      margin-bottom:10px;
    }

    p{
      color:#666;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:15px;
      border:2px solid #ddd;
      border-radius:10px;
      margin-bottom:20px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#ff4b2b;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#ff416c;
    }

    #result{
      margin-top:25px;
    }

    .download-btn{
      display:block;
      background:#28a745;
      color:white;
      text-decoration:none;
      padding:12px;
      border-radius:10px;
      margin-top:10px;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>Video Downloader</h1>

    <p>
      Download YouTube & Instagram Videos
    </p>

    <input
      type="text"
      id="videoLink"
      placeholder="Paste Video Link Here"
    >

    <button onclick="downloadVideo()">
      Download Video
    </button>

    <div id="result"></div>

  </div>

  <script>

    function downloadVideo(){

      let link = document.getElementById(
        "videoLink"
      ).value;

      let result = document.getElementById(
        "result"
      );

      if(link === ""){

        result.innerHTML = `
          <p style="color:red;">
            Please Paste Video Link
          </p>
        `;

        return;
      }

      result.innerHTML = `

        <h3 style="margin-bottom:15px;">
          Download Quality
        </h3>

        <a class="download-btn"
           href="${link}"
           target="_blank">
           Download 4K
        </a>

        <a class="download-btn"
           href="${link}"
           target="_blank">
           Download 2K
        </a>

        <a class="download-btn"
           href="${link}"
           target="_blank">
           Download HD
        </a>

      `;
    }

  </script>

</body>
</html>
